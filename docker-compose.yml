services:
  review-server:
    build: .
    command: uv run review-server
    ports:
      - "9999:9999"
    environment:
      - A2A_CARD_URL=http://review-server:9999/

  main:
    build: .
    command: uv run main
    stdin_open: true
    tty: true
    environment:
      - ANTHROPIC_API_KEY
      - A2A_BASE_URL=http://review-server:9999
    depends_on:
      - review-server
